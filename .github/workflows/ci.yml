name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: judge_user
          POSTGRES_PASSWORD: judge_pass
          POSTGRES_DB: judge_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx pytest-asyncio structlog prometheus_client

    - name: Run tests
      env:
        DATABASE_URL: postgresql+psycopg2://judge_user:judge_pass@localhost:5432/judge_db
        REDIS_URL: redis://localhost:6379
        SECRET_KEY: test_secret_key
      run: |
        pytest tests/ -v
