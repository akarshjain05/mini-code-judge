services:
  # ── 1. FastAPI Web Service ──────────────────────────────────────────
  - type: web
    name: mini-code-judge
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mini-code-judge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: mini-code-judge-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: TIME_LIMIT_SECONDS
        value: 2
      - key: MEMORY_LIMIT_MB
        value: 256



# ── 3. PostgreSQL Database ──────────────────────────────────────────
databases:
  - name: mini-code-judge-db
    plan: free

# ── 4. Redis ────────────────────────────────────────────────────────
# Add Redis manually in Render dashboard as a free Redis instance
# then link it to both services above
